<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>{% block title %}{% endblock %} — FinanceApp</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #080d18;
            --surface: #0f1623;
            --surface2: #161f30;
            --border: rgba(255,255,255,0.06);
            --accent: #00e5a0;
            --accent2: #00b4d8;
            --text: #e8edf5;
            --muted: #5a6478;
            --muted2: #8892a4;
            --sidebar-w: 240px;
        }

        body {
            margin: 0;
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            min-height: 100vh;
        }

        /* ── SIDEBAR ── */
        .sidebar {
            width: var(--sidebar-w);
            min-height: 100vh;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 28px 16px 16px;
            position: fixed;
            top: 0; left: 0; bottom: 0;
            z-index: 100;
            overflow-y: auto;
        }

        .sidebar-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 0 10px;
            margin-bottom: 36px;
            flex-shrink: 0;
        }
        .sidebar-brand-icon {
            width: 36px; height: 36px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 17px; flex-shrink: 0;
        }
        .sidebar-brand-name {
            font-family: 'Syne', sans-serif;
            font-weight: 800; font-size: 1.05rem;
            letter-spacing: -0.02em;
            color: var(--text);
        }

        .sidebar-section {
            font-size: 0.68rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: .1em;
            color: var(--muted);
            padding: 0 12px;
            margin-bottom: 8px;
            margin-top: 8px;
        }

        .sidebar nav {
            display: flex;
            flex-direction: column;
            gap: 2px;
            flex: 1;
        }

        .sidebar a {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--muted2);
            text-decoration: none;
            padding: 10px 12px;
            border-radius: 10px;
            font-size: 0.88rem;
            font-weight: 500;
            transition: background .15s, color .15s;
            position: relative;
        }
        .sidebar a:hover {
            background: var(--surface2);
            color: var(--text);
        }
        .sidebar a.active {
            background: rgba(0,229,160,0.08);
            color: var(--accent);
            border: 1px solid rgba(0,229,160,0.15);
        }
        .sidebar a.active::before {
            content: '';
            position: absolute;
            left: 0; top: 25%; bottom: 25%;
            width: 3px;
            background: var(--accent);
            border-radius: 0 4px 4px 0;
        }
        .sidebar a .nav-icon { font-size: 16px; flex-shrink: 0; }

        .sidebar-divider {
            height: 1px;
            background: var(--border);
            margin: 16px 0;
        }

        /* ── SIDEBAR BOTTOM ── */
        .sidebar-bottom {
            flex-shrink: 0;
            margin-top: auto;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        /* ── USER BOX ── */
        .user-box-link {
            display: block;
            text-decoration: none;
            border-radius: 12px;
            padding: 0;
            border: none;
            background: none;
        }
        .user-box-link::before { display: none; }

        .user-box {
            overflow: hidden;
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            border-radius: 12px;
            background: var(--surface2);
            border: 1px solid var(--border);
            transition: background .15s, border-color .15s;
        }
        .user-box-link:hover .user-box {
            background: #1c2840;
            border-color: rgba(255,255,255,0.1);
        }
        .user-box-link.active {
            background: none;
            color: inherit;
            border: none;
        }
        .user-box-link.active .user-box {
            border-color: rgba(0,229,160,0.2);
        }

        .user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.9rem;
            color: #080d18;
            background: linear-gradient(135deg, #00e5a0, #00b4d8);
            flex-shrink: 0;
        }

        .user-info {
            flex: 1;
            min-width: 0;
        }

        .user-name {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .user-email {
            font-size: 0.73rem;
            color: var(--muted2);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .user-chevron {
            color: var(--muted);
            font-size: 14px;
            flex-shrink: 0;
        }

        /* ── LOGOUT ── */
        .logout {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 10px;
            color: var(--muted) !important;
            text-decoration: none;
            font-size: 0.88rem;
            font-weight: 500;
            transition: background .15s, color .15s;
        }
        .logout:hover {
            background: rgba(248,113,113,0.08) !important;
            color: #f87171 !important;
        }
        .logout::before { display: none !important; }

        /* ── MAIN CONTENT ── */
        .content {
            margin-left: var(--sidebar-w);
            flex: 1;
            min-height: 100vh;
            background: var(--bg);
            position: relative;
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 768px) {
            :root { --sidebar-w: 0px; }
            .sidebar { transform: translateX(-240px); transition: transform .3s; }
            .sidebar.open { transform: translateX(0); width: 240px; }
            .content { margin-left: 0; }
            .menu-toggle {
                display: flex !important;
                position: fixed; top: 16px; left: 16px; z-index: 200;
                background: var(--surface); border: 1px solid var(--border);
                border-radius: 8px; padding: 8px 10px;
                cursor: pointer; font-size: 18px;
            }
        }
        .menu-toggle { display: none; }
    </style>
</head>

<body>

    <button class="menu-toggle" onclick="document.querySelector('.sidebar').classList.toggle('open')">☰</button>

    <!-- SIDEBAR -->
    <div class="sidebar">
        <div class="sidebar-brand">
            <div class="sidebar-brand-icon">💰</div>
            <span class="sidebar-brand-name">FinanceApp</span>
        </div>

        <nav>
            <span class="sidebar-section">Menu</span>

            <a href="/dashboard" class="{{ 'active' if request.path == '/dashboard' }}">
                <span class="nav-icon">📊</span> Dashboard
            </a>
            <a href="/goals" class="{{ 'active' if request.path == '/goals' }}">
                <span class="nav-icon">🎯</span> Metas
            </a>
            <a href="/investments" class="{{ 'active' if request.path == '/investments' }}">
                <span class="nav-icon">📈</span> Investimentos
            </a>
            <a href="/cards" class="{{ 'active' if request.path == '/cards' }}">
                <span class="nav-icon">💳</span> Cartão
            </a>
            <a href="/transactions" class="{{ 'active' if request.path == '/transactions' }}">
                <span class="nav-icon">💸</span> Transações
            </a>

            <div class="sidebar-divider"></div>
        </nav>

        <!-- BOTTOM: user + logout -->
        <div class="sidebar-bottom">
            <a href="/profile"
               class="user-box-link {{ 'active' if request.path == '/profile' }}">
                <div class="user-box">
                    <div class="user-avatar">
                        {{ current_user.name[0] | upper }}
                    </div>
                    <div class="user-info">
                        <div class="user-name">{{ current_user.name }}</div>
                        <div class="user-email">{{ current_user.email }}</div>
                    </div>
                    <div class="user-chevron">⋮</div>
                </div>
            </a>

            <a href="/logout" class="logout">
                <span class="nav-icon">🚪</span> Sair
            </a>
        </div>
    </div>

    <!-- CONTEÚDO DINÂMICO -->
    <div class="content">
        {% block content %}{% endblock %}
    </div>

</body>
</html>
